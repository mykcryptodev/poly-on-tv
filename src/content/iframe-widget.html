<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      overflow: hidden;
    }

    /* Main Widget Container */
    #polymarket-odds-widget {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      color: #fff;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      transition: all 0.3s ease;
      pointer-events: auto;
      width: max-content;
      height: max-content;
    }

    /* Widget with input form - darker background */
    #polymarket-odds-widget.pm-widget-with-input {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      padding: 16px;
      width: max-content;
      padding-top: 32px;
      position: relative;
    }

    /* Widget with embed - dark background */
    #polymarket-odds-widget.pm-widget-with-embed {
      padding-top: 32px;
      width: 450px !important;
    }

    /* Close button */
    .pm-close-btn {
      position: absolute;
      top: 8px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s ease;
      line-height: 1;
    }

    .pm-close-btn:hover {
      color: #fff;
    }

    /* Theme toggle button */
    .pm-theme-btn {
      position: absolute;
      top: 8px;
      right: 60px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s ease;
      line-height: 1;
    }

    .pm-theme-btn:hover {
      color: #fff;
    }

    /* Activity toggle button */
    .pm-activity-btn {
      position: absolute;
      top: 8px;
      right: 100px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s ease;
      line-height: 1;
    }

    .pm-activity-btn:hover {
      color: #fff;
    }

    #polymarket-odds-widget * {
      box-sizing: border-box;
    }

    /* Expanded State */
    #polymarket-odds-widget.pm-widget-expanded {
      height: auto;
      right: 4;
      position: absolute;
    }

    /* Content Area */
    .pm-widget-content {
      padding: 0;
      max-height: none;
      overflow: visible;
      width: max-content;
      height: max-content;
    }

    #polymarket-odds-widget.pm-widget-with-embed .pm-widget-content {
      padding: 8px;
    }

    .pm-widget-content::-webkit-scrollbar {
      width: 6px;
    }

    .pm-widget-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .pm-widget-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .pm-widget-content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Odds Container */
    .pm-odds-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pm-odds-container.pm-updated {
      animation: oddsUpdate 0.3s ease;
    }

    @keyframes oddsUpdate {
      0% {
        opacity: 0.7;
        transform: scale(0.98);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .pm-odds-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .pm-live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pm-live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .pm-live-text {
      font-size: 11px;
      font-weight: 600;
      color: #22c55e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pm-update-time {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Team Odds */
    .pm-team-odds-row {
      display: flex;
      gap: 12px;
    }

    .pm-team-odds-item {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 12px;
      transition: all 0.2s ease;
    }

    .pm-team-odds-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .pm-team-name {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      word-break: break-word;
    }

    .pm-odds-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pm-odds {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
      transition: color 0.3s ease;
    }

    .pm-odds-rising {
      color: #22c55e;
    }

    .pm-odds-falling {
      color: #ef4444;
    }

    .pm-odds-stable {
      color: #00d4ff;
    }

    .pm-odds-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 10px;
      text-align: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
    }

    .pm-odds-info {
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Empty States */
    .pm-odds-empty,
    .pm-odds-error,
    .pm-odds-loading,
    .pm-no-games {
      padding: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      line-height: 1.4;
    }

    .pm-odds-error {
      background: rgba(239, 68, 68, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    /* Game Selector Styles */
    .pm-game-selector {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .pm-selector-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 8px;
      margin-bottom: 12px;
    }

    /* Search Input */
    .pm-search-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 12px;
    }

    .pm-search-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .pm-search-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
    }

    /* Games List */
    .pm-games-list-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      margin: 0 -16px;
      padding: 0 16px;
    }

    .pm-games-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Game Item */
    .pm-game-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .pm-game-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateX(4px);
    }

    .pm-game-item:active {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .pm-game-teams {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      word-break: break-word;
      line-height: 1.3;
    }

    .pm-game-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Loading Spinner */
    .pm-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* URL Input Section */
    .pm-url-input-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
    }

    .pm-url-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pm-url-input {
      width: 100%;
      max-width: 320px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .pm-url-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .pm-url-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
    }

    .pm-url-button {
      width: 100%;
      max-width: 320px;
      padding: 10px 12px;
      background: rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.4);
      border-radius: 6px;
      color: #00d4ff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-sizing: border-box;
    }

    .pm-url-button:hover {
      background: rgba(0, 212, 255, 0.3);
      border-color: rgba(0, 212, 255, 0.6);
    }

    .pm-url-button:active {
      background: rgba(0, 212, 255, 0.25);
    }

    /* Responsive */
    @media (max-width: 768px) {
      #polymarket-odds-widget.pm-widget-expanded {
        width: 280px;
        max-height: 70vh;
      }
    }
  </style>
</head>
<body>
  <div id="polymarket-odds-widget" class="pm-widget-expanded">
    <div class="pm-widget-content">
      <div class="pm-odds-content"></div>
    </div>
  </div>

  <script src="iframe-widget.js"></script>
</body>
</html>
